<!-- Contact Form -->
<section id="contact" class="contact-section">
  <div class="contact-container">
    <h2 class="text-center">Contact Us</h2>
    <p class="text-center">Book a pitch, ask about gear, or send us a message.</p>

    <div class="contact-icons text-center mb-3">
      <a href="https://zalo.me/yourzalolink" target="_blank" class="text-success mx-2"><i class="bi bi-chat-dots-fill fa-2x"></i></a>
      <a href="https://instagram.com/yourusername" target="_blank" class="text-danger mx-2"><i class="bi bi-instagram fa-2x"></i></a>
      <a href="mailto:your-email@example.com" class="text-light mx-2"><i class="bi bi-envelope-fill fa-2x"></i></a>
    </div>

    <!-- Email Form -->
    <form action="mailto:your-email@example.com" method="post" enctype="text/plain" class="contact-form">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="reason">Reason for Contact</label>
      <select id="reason" name="reason">
        <option value="booking">Pitch Booking</option>
        <option value="shop">Shop Inquiry</option>
        <option value="general">General Question</option>
      </select>

      <label for="message">Your Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your message here" required></textarea>

      <button type="submit">Send Message</button>
    </form>
    <br/> <br/>

    <!-- Map -->
    <div class="map-wrapper">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5550.427266301739!2d107.07745168414402!3d10.362282017171314!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31756fc0c00a7a49%3A0x515b344a3fa287a!2zU8OibiBiw7NuZyDEkcOhIFRow6BuaCBOYW0!5e0!3m2!1sen!2sth!4v1782447249407!5m2!1sen!2sth"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="strict-origin-when-cross-origin"
              title="Thành Nam FC location"></iframe>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center p-4 mt-5">
      <p>📍 Find us on the map above</p>
      <p>© 2025 Thành Nam FC – Pitches, Gear, and Community</p>
    </footer>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
